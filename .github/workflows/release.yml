# Reusable release workflow for Tangle blueprint operators.
# Copy this to .github/workflows/release.yml in each blueprint repo and set
# the `BINARY_NAME` repo variable (or edit the default below).
#
# Builds the operator for x86_64-unknown-linux-gnu — the target operators
# actually run on — NATIVELY on ubuntu (no cross-compilation). Cross builds
# (musl/arm64/macos) repeatedly broke on aws-lc-sys' GCC memcmp bug inside the
# `cross` containers; a native gnu build is reliable and is what servers use.
#
# Uploads the stripped binary + sha256 as GitHub Release assets (free hosting).
# The on-chain version is then registered from tnt-core's
# `publish-blueprint-binary` workflow.
#
# Usage: git tag v0.1.0 && git push origin v0.1.0   (or run via workflow_dispatch)
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build a release for (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ${{ vars.BINARY_NAME || 'llm-operator' }}
  TARGET: x86_64-unknown-linux-gnu

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ github.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin "$BINARY_NAME"

      - name: Package archive + checksum
        run: |
          BIN="target/release/${BINARY_NAME}"
          test -f "$BIN" || { echo "::error::binary not found: $BIN"; exit 1; }
          strip "$BIN" 2>/dev/null || true
          ARCHIVE="${BINARY_NAME}-${TARGET}.tar.xz"
          tar -cJf "$ARCHIVE" -C target/release "$BINARY_NAME"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "Built $(du -h "$ARCHIVE" | cut -f1) archive"
          cat "${ARCHIVE}.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          NOTES="### Operator binary

          | Target | Archive |
          |--------|---------|
          | \`${TARGET}\` | \`${ARCHIVE}\` |

          Verify: \`sha256sum -c ${ARCHIVE}.sha256\`
          Register on-chain via tnt-core \`publish-blueprint-binary\` (tag \`${TAG}\`)."
          # create the release if missing, then upload assets (idempotent re-runs).
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "$NOTES"
          gh release upload "$TAG" "$ARCHIVE" "${ARCHIVE}.sha256" --repo "$GITHUB_REPOSITORY" --clobber
